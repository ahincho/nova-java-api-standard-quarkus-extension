name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    uses: ahincho/nova-devops/.github/workflows/reusable-release-please.yml@main
    with:
      release-type: java
      path: .
      config-file: .release-please-config.json
      manifest-file: .release-please-manifest.json
    secrets:
      # NOVA_RELEASE_PAT es un Personal Access Token (contents:write + pull-requests:write).
      # GITHUB_TOKEN no funciona aqui porque GitHub no triggerea nuevos workflow runs
      # (e.g., publish-on-tag.yml) para tags/pushes hechos con el token automatico.
      # Fallback a GITHUB_TOKEN si el PAT aun no esta configurado (release-please funciona,
      # solo que el tag que crea no auto-triggeara el publish).
      GH_TOKEN: ${{ secrets.NOVA_RELEASE_PAT || secrets.GITHUB_TOKEN }}